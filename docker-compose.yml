# Docker Compose for Tetris Server Only
version: "3.8"

services:
  tetris-server:
    build: .
    ports:
      - "${SERVER_PORT:-3001}:3001" # Server (Node.js Socket.IO)
    environment:
      - NODE_ENV=production
      - PORT=${SERVER_PORT:-3001}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs # Optional: mount logs directory
